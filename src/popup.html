<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request Lens</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div class="brand">
          <span class="brand-mark">RL</span>
          <div>
            <h1>Request Lens</h1>
            <p id="stateText">Capture off</p>
          </div>
        </div>
        <label class="toggle" title="Toggle capture">
          <input id="enabledToggle" type="checkbox" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </header>

      <section class="stats" aria-label="Stats">
        <div>
          <strong id="totalCount">0</strong>
          <span>Total</span>
        </div>
        <div>
          <strong id="okCount">0</strong>
          <span>OK</span>
        </div>
        <div>
          <strong id="errorCount">0</strong>
          <span>Errors</span>
        </div>
      </section>

      <section class="actions" aria-label="Actions">
        <button id="openDashboard" class="button primary" type="button">Inspector</button>
        <button id="clearCaptures" class="button ghost" type="button">Clear</button>
      </section>

      <section class="recent-wrap">
        <div class="section-title">
          <h2>Recent</h2>
          <span id="methodMix">Idle</span>
        </div>
        <ol id="recentList" class="recent"></ol>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
